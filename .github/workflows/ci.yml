name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest -q

  install-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install from wheel in fresh venv
        run: |
          python -m venv /tmp/install-check-venv
          /tmp/install-check-venv/bin/pip install dist/*.whl

      - name: Verify CLI entry point
        run: /tmp/install-check-venv/bin/eyeroll --help

  smoke-test:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js (needed by yt-dlp for YouTube)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install eyeroll
        run: |
          python -m pip install --upgrade pip
          pip install '.[openai,dev]'

      - name: Verify CLI is accessible
        run: eyeroll --help

      - name: Configure yt-dlp to use Node.js runtime
        run: |
          mkdir -p ~/.config/yt-dlp
          echo "--js-runtimes nodejs" > ~/.config/yt-dlp/config

      - name: Smoke test — watch a short YouTube video
        run: eyeroll watch https://www.youtube.com/watch?v=jNQXAC9IVRw --backend openai

      - name: Run integration tests
        run: pytest tests/test_integration.py -v -m integration

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check if version exists on PyPI
        id: check
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/eyeroll/$VERSION/json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already exists on PyPI"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not found on PyPI, will publish"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
