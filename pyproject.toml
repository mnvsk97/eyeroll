[project]
name = "reelfix"
version = "0.1.0"
description = "Watch a bug video, understand it, map it to code, fix it."
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "python-dotenv>=1.0",
    "google-genai>=1.0",
    "imageio-ffmpeg>=0.5",
    "yt-dlp>=2024.0",
]

[project.scripts]
reelfix = "reelfix.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["reelfix"]

[dependency-groups]
test = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
